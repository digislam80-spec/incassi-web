{% extends "base.html" %}
{% block content %}
<section class="app-entry">
  <div class="entry-card">
    <img class="brand-illustration compact" src="{{ url_for('static', filename='favicon.png') }}" alt="FantaCalcetto Digislam">
    <p class="eyebrow">FantaCalcetto</p>
    <h1>Entra nello spogliatoio.</h1>
    <p class="lede">Un solo ingresso: entri come supporter, chiedi di diventare calciatore o gestisci la tua lega se sei Mister.</p>
    <div class="entry-actions">
      <a class="button primary big" href="{{ url_for('player_login') }}">Login lega</a>
      <a class="button big" href="{{ url_for('register_player') }}">Registrati</a>
      <a class="button ghost big" href="{{ url_for('admin_login') }}">Area Mister</a>
    </div>
  </div>
</section>
{% endblock %}
