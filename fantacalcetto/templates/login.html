{% extends "base.html" %}
{% block content %}
<section class="public-card login-card">
  <p class="eyebrow">Area admin</p>
  <img class="brand-illustration compact" src="{{ url_for('static', filename='favicon.png') }}" alt="FantaCalcetto Digislam">
  <h1>PIN del mister</h1>
  <p class="lede">Cabina di regia FantaCalcetto. Digislam Print Lab in panchina.</p>
  {% if error %}
    <div class="notice soft">{{ error }}</div>
  {% endif %}
  <form class="form login-form" method="post">
    <label>PIN admin <input name="pin" type="password" inputmode="numeric" autocomplete="current-password" required autofocus></label>
    <button class="button primary" type="submit">Entra in cabina di regia</button>
  </form>
</section>
{% endblock %}
